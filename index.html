<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia - Estilo Burton</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:italic,wght@400;700&family=Pirata+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="book-container">
        <div class="book">
            <div class="page left-page">
                <div class="burton-quote">
                    <p>"Con esta mano yo sostendré tus anhelos..."</p>
                    <p>"Tu copa nunca estará vacía, pues yo seré tu vino."</p>
                    <p>"Con esta vela alumbraré tu camino en la oscuridad."</p>
                    <p class="movie">- El Cadáver de la Novia</p>
                </div>
            </div>
            <div class="page right-page">
                <div class="tree-container">
                    <img src="arbol.png" alt="Árbol Corazón">
                </div>
                <h2 class="question">¿Quieres ser mi novia?</h2>
                <div class="buttons-container">
                    <button class="btn yes" onclick="confirmar()">SÍ</button>
                    <button class="btn no" id="noButton" onmouseover="moverBotonNo()">No</button>
                </div>
            </div>
        </div>
    </div>
<audio id="musica" loop>
    <source src="https://www.chosic.com/wp-content/uploads/2021/07/Rainy-Day-Music-Loop.mp3" type="audio/mpeg">
</audio>
    <script src="script.js"></script>
</body>
</html>
